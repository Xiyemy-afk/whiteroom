<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHITE ROOM — Ayanokouji Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #000000;
    --white: #FFFFFF;
    --gold: #C8B400;
    --gold-dim: #6B6000;
    --card: #0D0D0D;
    --card2: #141414;
    --border: #222222;
    --red: #FF3B3B;
    --blue: #3B8BFF;
    --green: #00C875;
    --mono: 'Space Mono', monospace;
    --body: 'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 0.8s ease;
  }
  #intro.fade-out { opacity: 0; pointer-events: none; }

  .intro-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(200,180,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,180,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 3s ease-in-out infinite;
  }
  @keyframes gridPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  .intro-content { text-align: center; z-index: 1; }
  .intro-logo {
    font-family: var(--mono);
    font-size: clamp(14px, 3vw, 22px);
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 8px;
    animation: typeIn 1s steps(20) forwards;
    overflow: hidden; white-space: nowrap;
    width: 0;
  }
  @keyframes typeIn { to { width: 100%; } }

  .intro-title {
    font-family: var(--mono);
    font-size: clamp(48px, 12vw, 120px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 0.9;
    color: #fff;
    animation: fadeUp 0.8s 1.2s ease forwards;
    opacity: 0; transform: translateY(20px);
  }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  .intro-sub {
    font-family: var(--mono);
    font-size: clamp(10px, 2vw, 13px);
    letter-spacing: 0.3em;
    color: #444;
    margin-top: 16px;
    animation: fadeUp 0.8s 1.8s ease forwards;
    opacity: 0; transform: translateY(10px);
  }

  .intro-bar {
    width: 300px; height: 2px;
    background: #111;
    margin: 40px auto 0;
    animation: fadeUp 0s 2.4s ease forwards;
    opacity: 0;
  }
  .intro-bar-fill {
    height: 100%; width: 0;
    background: var(--gold);
    animation: barLoad 1.5s 2.5s ease forwards;
  }
  @keyframes barLoad { to { width: 100%; } }

  .intro-enter {
    margin-top: 32px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #333;
    animation: blink 1s 4s infinite, fadeUp 0s 4s forwards;
    opacity: 0;
    cursor: pointer;
    border: 1px solid #222;
    padding: 12px 32px;
    background: transparent;
    color: var(--gold);
    transition: all 0.2s;
  }
  .intro-enter:hover { background: var(--gold); color: #000; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── MAIN APP ── */
  #app { display: none; }
  #app.visible { display: block; }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(0,0,0,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .header-brand {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold);
  }
  .header-stats {
    display: flex; gap: 20px; align-items: center;
  }
  .hstat {
    font-family: var(--mono);
    font-size: 11px;
    color: #666;
    letter-spacing: 0.1em;
  }
  .hstat span {
    color: var(--white);
    font-weight: 700;
  }
  .hstat.xp span { color: var(--gold); }
  .hstat.lvl span { color: var(--green); }
  .hstat.streak span { color: var(--red); }

  /* ── XP BAR ── */
  .xpbar-wrap {
    width: 100%; height: 3px;
    background: #111;
    position: relative;
  }
  .xpbar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
    position: relative;
  }
  .xpbar-fill::after {
    content: '';
    position: absolute; right: 0; top: -2px;
    width: 6px; height: 7px;
    background: var(--gold);
    border-radius: 1px;
  }

  /* ── LAYOUT ── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── DASHBOARD ── */
  .dash-greeting {
    font-family: var(--mono);
    font-size: clamp(11px, 2vw, 13px);
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .dash-title {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .dash-sub {
    color: #444;
    font-size: 13px;
    margin-bottom: 40px;
  }

  /* ── LEVEL MAP ── */
  .levelmap-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #444;
    margin-bottom: 20px;
  }
  .levelmap {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
    margin-bottom: 48px;
  }
  .lvl-node {
    aspect-ratio: 1;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 9px;
    color: #333;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    background: var(--card);
  }
  .lvl-node:hover { border-color: #333; color: #666; }
  .lvl-node.unlocked { border-color: #2a2a2a; color: #555; }
  .lvl-node.completed {
    background: #0a0a0a;
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .lvl-node.current {
    background: var(--gold);
    color: #000;
    font-weight: 700;
    border-color: var(--gold);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(200,180,0,0.4)} 50%{box-shadow:0 0 0 6px rgba(200,180,0,0)} }

  .lvl-node.boss {
    border-color: var(--red) !important;
    color: var(--red) !important;
  }
  .lvl-node.boss.completed { background: #1a0000; }

  /* ── CATEGORY GRID ── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 48px;
  }
  .cat-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card);
    position: relative;
    overflow: hidden;
  }
  .cat-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--cat-color, var(--gold));
    opacity: 0.5;
  }
  .cat-card:hover {
    border-color: #333;
    background: var(--card2);
    transform: translateY(-2px);
  }
  .cat-icon { font-size: 28px; margin-bottom: 12px; display: block; }
  .cat-name {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--white);
    margin-bottom: 4px;
  }
  .cat-desc { font-size: 11px; color: #444; margin-bottom: 12px; }
  .cat-prog {
    height: 2px; background: #1a1a1a; border-radius: 1px;
  }
  .cat-prog-fill {
    height: 100%;
    background: var(--cat-color, var(--gold));
    border-radius: 1px;
    transition: width 0.5s;
  }

  /* ── LEADERBOARD ── */
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #444;
    padding: 8px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .lb-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #0d0d0d;
    font-family: var(--mono);
    font-size: 12px;
  }
  .lb-rank { color: #444; }
  .lb-rank.top1 { color: #FFD700; }
  .lb-rank.top2 { color: #C0C0C0; }
  .lb-rank.top3 { color: #CD7F32; }
  .lb-name { color: var(--white); }
  .lb-xp { color: var(--gold); }
  .lb-lvl { color: var(--green); }
  .lb-you { background: rgba(200,180,0,0.05); }

  /* ── QUIZ SCREEN ── */
  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
  }
  .quiz-meta {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: #444;
  }
  .quiz-meta span { color: var(--gold); }
  .timer-display {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--white);
    transition: color 0.3s;
  }
  .timer-display.warn { color: var(--red); animation: timerWarn 0.5s infinite; }
  @keyframes timerWarn { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    margin-bottom: 24px;
    min-height: 200px;
  }
  .q-type-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--gold);
    background: rgba(200,180,0,0.08);
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 20px;
    display: inline-block;
  }
  .q-text {
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .q-subtext {
    font-size: 13px;
    color: #555;
    margin-bottom: 24px;
    font-family: var(--mono);
  }

  /* ── OPTIONS ── */
  .options { display: grid; gap: 10px; }
  .option {
    border: 1px solid #1f1f1f;
    border-radius: 6px;
    padding: 16px 20px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 14px;
    transition: all 0.15s;
    background: transparent;
    text-align: left;
    color: var(--white);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
  }
  .option:hover:not(:disabled) {
    border-color: #333;
    background: rgba(255,255,255,0.02);
  }
  .option.selected { border-color: var(--gold); background: rgba(200,180,0,0.06); }
  .option.correct { border-color: var(--green) !important; background: rgba(0,200,117,0.08) !important; }
  .option.wrong { border-color: var(--red) !important; background: rgba(255,59,59,0.08) !important; }
  .option:disabled { cursor: default; }
  .opt-key {
    font-family: var(--mono);
    font-size: 11px;
    color: #444;
    min-width: 20px;
    margin-top: 2px;
  }
  .option.selected .opt-key { color: var(--gold); }

  /* ── INPUT FIELD ── */
  .q-input {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #1f1f1f;
    border-radius: 6px;
    padding: 16px 20px;
    color: var(--white);
    font-family: var(--mono);
    font-size: 18px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }
  .q-input:focus { border-color: var(--gold); }
  .q-input.correct { border-color: var(--green); }
  .q-input.wrong { border-color: var(--red); }

  /* ── BUTTONS ── */
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 12px 28px;
    border: 1px solid;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
    font-weight: 700;
  }
  .btn-primary:hover { background: #FFE500; border-color: #FFE500; }
  .btn-secondary {
    background: transparent;
    border-color: #222;
    color: #666;
  }
  .btn-secondary:hover { border-color: #444; color: var(--white); }
  .btn-danger {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
  }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* ── EXPLANATION BOX ── */
  .explanation {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-left: 3px solid var(--gold);
    border-radius: 4px;
    padding: 20px 24px;
    margin-top: 20px;
    display: none;
  }
  .explanation.show { display: block; }
  .expl-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .expl-text { font-size: 14px; color: #aaa; line-height: 1.7; }
  .expl-text strong { color: var(--white); }

  /* ── XP POPUP ── */
  .xp-popup {
    position: fixed;
    top: 80px; right: 24px;
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 6px;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--gold);
    z-index: 500;
    animation: popIn 0.3s ease, popOut 0.4s 1.8s ease forwards;
    pointer-events: none;
  }
  @keyframes popIn { from { opacity:0; transform: translateY(-10px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes popOut { to { opacity:0; transform: translateY(-10px); } }

  /* ── RESULTS ── */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 48px;
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }
  .result-score {
    font-family: var(--mono);
    font-size: clamp(64px, 15vw, 120px);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.3em;
    color: #444;
    margin-bottom: 32px;
  }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }
  .rstat { text-align: center; }
  .rstat-val {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 4px;
  }
  .rstat-key {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #444;
  }

  /* ── STROOP ── */
  .stroop-word {
    font-family: var(--mono);
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 700;
    text-align: center;
    padding: 60px 0;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .stroop-q {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
    font-family: var(--mono);
    letter-spacing: 0.1em;
  }

  /* ── VISUAL MEMORY ── */
  .memory-grid {
    display: grid;
    gap: 8px;
    margin: 0 auto;
    max-width: 400px;
  }
  .mem-cell {
    aspect-ratio: 1;
    border: 1px solid #1a1a1a;
    border-radius: 4px;
    background: var(--card);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mem-cell.lit { background: var(--gold); border-color: var(--gold); }
  .mem-cell.correct { background: var(--green); border-color: var(--green); }
  .mem-cell.wrong { background: var(--red); border-color: var(--red); }
  .mem-cell:hover:not(.lit) { border-color: #333; }

  /* ── TRADING SIM ── */
  .chart-area {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    height: 200px;
    overflow: hidden;
  }
  .price-display {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .price-change {
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 24px;
  }
  .price-change.up { color: var(--green); }
  .price-change.down { color: var(--red); }
  .trade-btns { display: flex; gap: 12px; margin-bottom: 20px; }
  .btn-buy {
    flex: 1; padding: 16px;
    background: rgba(0,200,117,0.1);
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .btn-buy:hover { background: rgba(0,200,117,0.2); }
  .btn-sell {
    flex: 1; padding: 16px;
    background: rgba(255,59,59,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .btn-sell:hover { background: rgba(255,59,59,0.2); }

  .portfolio-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #0d0d0d;
    font-family: var(--mono); font-size: 12px;
  }
  .portfolio-row .key { color: #444; }
  .portfolio-row .val { color: var(--white); }
  .portfolio-row .val.up { color: var(--green); }
  .portfolio-row .val.down { color: var(--red); }

  canvas#miniChart {
    position: absolute; inset: 0; width: 100%; height: 100%;
    opacity: 0.6;
  }

  /* ── LOADING STATE ── */
  .ai-loading {
    display: flex; align-items: center; gap: 12px;
    padding: 40px; justify-content: center;
    font-family: var(--mono); font-size: 12px; color: #444;
  }
  .dots span {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: dotBounce 1.2s infinite;
    margin: 0 2px;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    overflow-x: auto;
  }
  .nav-tab {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #444;
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    background: none;
    border-top: none; border-left: none; border-right: none;
  }
  .nav-tab:hover { color: #888; }
  .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #444;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #0d0d0d;
  }

  /* ── MISC ── */
  .flex { display: flex; }
  .gap-12 { gap: 12px; }
  .mt-24 { margin-top: 24px; }
  .mt-16 { margin-top: 16px; }
  .text-gold { color: var(--gold); }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .mono { font-family: var(--mono); }
  .text-sm { font-size: 12px; }
  .text-xs { font-size: 11px; }

  .badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid;
  }

  @media (max-width: 640px) {
    .levelmap { grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .lvl-node { font-size: 7px; }

  /* Password strength */

  /* Header logout btn */

<script>
// ═══════════════════════════════════════
// AUTH SYSTEM — Multi-account, 1000+ users
// Storage: wr_accounts (registry) + wr_user_{username} (per-user data)
// ═══════════════════════════════════════

const AUTH = {
  currentUser: null,   // username of logged-in user
};

// Simple hash (not crypto-secure, but fine for client-side game)
function hashPassword(pw) {
  let h = 0x811c9dc5;
  for (let i = 0; i < pw.length; i++) {
    h ^= pw.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  // Second pass with salt
  let h2 = 0xdeadbeef;
  for (let i = pw.length - 1; i >= 0; i--) {
    h2 ^= pw.charCodeAt(i);
    h2 = (h2 * 0x9747b28c) >>> 0;
  }
  return (h >>> 0).toString(16).padStart(8,'0') + (h2 >>> 0).toString(16).padStart(8,'0');
}

// Get account registry (list of {username, displayName, createdAt, lastLogin, xp, level})
function getRegistry() {
  try { return JSON.parse(localStorage.getItem('wr_accounts') || '[]'); }
  catch(e) { return []; }
}
function saveRegistry(reg) {
  localStorage.setItem('wr_accounts', JSON.stringify(reg));
}

// Get per-user data
function getUserData(username) {
  try {
    const raw = localStorage.getItem('wr_user_' + username.toLowerCase());
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}
function saveUserData(username, data) {
  localStorage.setItem('wr_user_' + username.toLowerCase(), JSON.stringify(data));
}

function userExists(username) {
  const reg = getRegistry();
  return reg.some(u => u.username.toLowerCase() === username.toLowerCase());
}

function registerUser(username, password, displayName) {
  // Validasi
  if (username.length < 3) return { ok: false, msg: 'Username minimal 3 karakter' };
  if (username.length > 20) return { ok: false, msg: 'Username maksimal 20 karakter' };
  if (!/^[a-zA-Z0-9_]+$/.test(username)) return { ok: false, msg: 'Hanya huruf, angka, underscore' };
  if (password.length < 6) return { ok: false, msg: 'Password minimal 6 karakter' };
  if (userExists(username)) return { ok: false, msg: 'Username sudah dipakai' };

  const reg = getRegistry();
  const now = Date.now();
  const entry = {
    username: username.toLowerCase(),
    displayName: displayName || username.toUpperCase(),
    passwordHash: hashPassword(password),
    createdAt: now,
    lastLogin: now,
    xp: 0,
    level: 1,
  };
  reg.push(entry);
  saveRegistry(reg);

  // Create empty user data
  const userData = {
    xp: 0, level: 1, streak: 0,
    completed: [], catProgress: {},
    playerName: entry.displayName,
    tradeData: { cash: 10000, shares: 0, price: 100, history: [100], pnl: 0 },
    totalAnswered: 0, totalCorrect: 0,
    joinedAt: now,
  };
  saveUserData(username, userData);
  return { ok: true };
}

function loginUser(username, password) {
  const reg = getRegistry();
  const entry = reg.find(u => u.username.toLowerCase() === username.toLowerCase());
  if (!entry) return { ok: false, msg: 'Username tidak ditemukan' };
  if (entry.passwordHash !== hashPassword(password)) return { ok: false, msg: 'Password salah' };

  // Update last login
  entry.lastLogin = Date.now();
  saveRegistry(reg);

  AUTH.currentUser = entry.username;
  localStorage.setItem('wr_session', entry.username);

  // Load user data into STATE
  const data = getUserData(entry.username);
  if (data) loadUserIntoState(data);
  return { ok: true };
}

function logoutUser() {
  if (!confirm('Yakin mau logout?')) return;
  // Save current state first
  syncStateToStorage();
  AUTH.currentUser = null;
  localStorage.removeItem('wr_session');
  clearTimer();
  if (chartInterval) clearInterval(chartInterval);
  document.getElementById('app').classList.remove('visible');
  document.getElementById('app').style.display = 'none';
  showAuthScreen();
}

function loadUserIntoState(data) {
  STATE.xp = data.xp || 0;
  STATE.level = data.level || 1;
  STATE.streak = data.streak || 0;
  STATE.completed = data.completed || [];
  STATE.catProgress = data.catProgress || {};
  STATE.playerName = data.playerName || 'PLAYER';
  STATE.tradeData = data.tradeData || { cash: 10000, shares: 0, price: 100, history: [100], pnl: 0 };
  STATE.totalAnswered = data.totalAnswered || 0;
  STATE.totalCorrect = data.totalCorrect || 0;
}

function syncStateToStorage() {
  if (!AUTH.currentUser) return;
  const existing = getUserData(AUTH.currentUser) || {};
  const data = {
    ...existing,
    xp: STATE.xp,
    level: STATE.level,
    streak: STATE.streak,
    completed: STATE.completed,
    catProgress: STATE.catProgress,
    playerName: STATE.playerName,
    tradeData: STATE.tradeData,
    totalAnswered: STATE.totalAnswered || 0,
    totalCorrect: STATE.totalCorrect || 0,
  };
  saveUserData(AUTH.currentUser, data);

  // Also update registry snapshot
  const reg = getRegistry();
  const entry = reg.find(u => u.username === AUTH.currentUser);
  if (entry) { entry.xp = STATE.xp; entry.level = STATE.level; saveRegistry(reg); }
}

// ═══════════════════════════════════════
// STATE (runtime, gets loaded from auth)
// ═══════════════════════════════════════
const STATE = {
  xp: 0, level: 1, streak: 0,
  completed: [], catProgress: {},
  playerName: 'PLAYER',
  currentCat: null, currentQ: null,
  timer: null, timerVal: 0,
  stroopCorrect: 0, stroopTotal: 0,
  memPattern: [], memSelected: [], memPhase: 'show',
  tradeData: { cash: 10000, shares: 0, price: 100, history: [100], pnl: 0 },
  totalAnswered: 0, totalCorrect: 0,
};

function save() { syncStateToStorage(); }

// ═══════════════════════════════════════
// AUTH UI
// ═══════════════════════════════════════
function showAuthScreen() {
  const scr = document.getElementById('authScreen');
  scr.classList.remove('hidden');
  const session = localStorage.getItem('wr_session');
  const reg = getRegistry();
  if (reg.length > 0) {
    renderAuthAccountPicker(session);
  } else {
    renderAuthForm('register');
  }
}

function renderAuthAccountPicker(preselect) {
  const reg = getRegistry();
  const box = document.getElementById('authBox');
  const sorted = [...reg].sort((a,b) => (b.lastLogin||0) - (a.lastLogin||0)).slice(0, 50);
  const totalUsers = reg.length;

  box.innerHTML = `
    <div class="auth-logo">WHITE ROOM PROTOCOL</div>
    <div class="auth-title">Pilih Akun</div>
    <div class="auth-sub">${totalUsers.toLocaleString()} akun terdaftar • Pilih atau buat baru</div>

    <div class="acct-list" id="acctList">
      ${sorted.map(u => `
        <div class="acct-item" onclick="selectAccount('${u.username}')">
          <div class="acct-avatar">${u.displayName.charAt(0)}</div>
          <div class="acct-info">
            <div class="acct-name">${u.displayName}</div>
            <div class="acct-meta">@${u.username} · Lv.${u.level} · ${u.xp.toLocaleString()} XP</div>
          </div>
          <div class="acct-arrow">›</div>
        </div>
      `).join('')}
      ${totalUsers > 50 ? `<div style="font-family:var(--mono);font-size:10px;color:#444;text-align:center;padding:8px">+${(totalUsers-50).toLocaleString()} akun lainnya</div>` : ''}
    </div>

    <hr class="auth-divider">
    <button class="auth-btn" style="background:transparent;border:1px solid #222;color:#666;margin-top:0" onclick="renderAuthForm('register')">+ BUAT AKUN BARU</button>
    <div style="text-align:center;margin-top:12px">
      <button onclick="renderAuthForm('login')" style="font-family:var(--mono);font-size:10px;color:#444;background:none;border:none;cursor:pointer;letter-spacing:0.1em">Login dengan username</button>
    </div>
    <div class="auth-stats-row">
      <div class="auth-stat"><div class="auth-stat-val">${totalUsers.toLocaleString()}</div><div class="auth-stat-key">PENGGUNA</div></div>
      <div class="auth-stat"><div class="auth-stat-val">${reg.reduce((s,u)=>s+(u.xp||0),0).toLocaleString()}</div><div class="auth-stat-key">TOTAL XP</div></div>
      <div class="auth-stat"><div class="auth-stat-val">${Math.max(...reg.map(u=>u.level||1))}</div><div class="auth-stat-key">LVL TERTINGGI</div></div>
    </div>
  `;
}

function selectAccount(username) {
  renderAuthForm('login', username);
}

function renderAuthForm(mode, prefillUsername) {
  const box = document.getElementById('authBox');
  const reg = getRegistry();

  box.innerHTML = `
    <div class="auth-logo">WHITE ROOM PROTOCOL</div>
    <div class="auth-title">${mode === 'register' ? 'Daftar' : 'Masuk'}</div>
    <div class="auth-sub">${mode === 'register' ? 'Buat akun baru • Gratis selamanya' : 'Masuk ke akunmu'}</div>

    <div class="auth-tabs">
      <button class="auth-tab ${mode==='login'?'active':''}" onclick="renderAuthForm('login')">LOGIN</button>
      <button class="auth-tab ${mode==='register'?'active':''}" onclick="renderAuthForm('register')">DAFTAR</button>
      ${reg.length > 0 ? `<button class="auth-tab" onclick="renderAuthAccountPicker()">← PILIH AKUN</button>` : ''}
    </div>

    ${mode === 'register' ? `
    <div class="auth-field">
      <label class="auth-label">DISPLAY NAME</label>
      <input class="auth-input" id="authDisplay" placeholder="Nama tampilan kamu" maxlength="30" oninput="clearAuthError()">
    </div>
    ` : ''}

    <div class="auth-field">
      <label class="auth-label">USERNAME</label>
      <input class="auth-input" id="authUser" placeholder="3-20 karakter, a-z 0-9 _" maxlength="20"
        value="${prefillUsername || ''}"
        oninput="clearAuthError();${mode==='register'?'checkUsernameAvail()':''}"
        onkeydown="if(event.key==='Enter')document.getElementById('authPass').focus()">
      <div class="auth-error" id="userError"></div>
    </div>

    <div class="auth-field">
      <label class="auth-label">PASSWORD</label>
      <input class="auth-input" id="authPass" type="password" placeholder="${mode==='register'?'Min 6 karakter':'Password kamu'}" maxlength="50"
        oninput="clearAuthError();${mode==='register'?'checkPwStrength()':''}"
        onkeydown="if(event.key==='Enter')submitAuth('${mode}')">
      ${mode === 'register' ? `
      <div class="pw-strength-bar"><div class="pw-strength-fill" id="pwBar"></div></div>
      <div class="pw-strength-label" id="pwLabel">—</div>
      ` : ''}
    </div>

    ${mode === 'register' ? `
    <div class="auth-field">
      <label class="auth-label">KONFIRMASI PASSWORD</label>
      <input class="auth-input" id="authPass2" type="password" placeholder="Ulangi password" maxlength="50"
        onkeydown="if(event.key==='Enter')submitAuth('register')"
        oninput="clearAuthError()">
    </div>
    ` : ''}

    <div class="auth-error" id="authError"></div>

    <button class="auth-btn" id="authSubmitBtn" onclick="submitAuth('${mode}')">
      ${mode === 'register' ? 'DAFTAR SEKARANG ▶' : 'MASUK ▶'}
    </button>

    <div style="margin-top:16px;text-align:center;font-family:var(--mono);font-size:9px;color:#333;letter-spacing:0.1em">
      Data tersimpan lokal di perangkat ini • Tidak dikirim ke server
    </div>
  `;

  if (prefillUsername) setTimeout(() => document.getElementById('authPass')?.focus(), 50);
  else setTimeout(() => document.getElementById(mode==='register' ? 'authDisplay' : 'authUser')?.focus(), 50);
}

function clearAuthError() {
  const e = document.getElementById('authError');
  const u = document.getElementById('userError');
  if (e) e.textContent = '';
  if (u) u.textContent = '';
  document.querySelectorAll('.auth-input').forEach(i => i.classList.remove('error'));
}

let _usernameCheckTimer;
function checkUsernameAvail() {
  clearTimeout(_usernameCheckTimer);
  _usernameCheckTimer = setTimeout(() => {
    const u = document.getElementById('authUser');
    const errEl = document.getElementById('userError');
    if (!u || !errEl) return;
    const val = u.value.trim();
    if (val.length < 3) { errEl.textContent = ''; return; }
    if (!/^[a-zA-Z0-9_]+$/.test(val)) {
      errEl.textContent = '✗ Hanya huruf, angka, underscore';
      u.classList.add('error'); return;
    }
    if (userExists(val)) {
      errEl.textContent = '✗ Username sudah dipakai';
      errEl.style.color = 'var(--red)';
      u.classList.add('error');
    } else if (val.length >= 3) {
      errEl.textContent = '✓ Username tersedia';
      errEl.style.color = 'var(--green)';
      u.classList.remove('error'); u.classList.add('success');
    }
  }, 400);
}

function checkPwStrength() {
  const pw = document.getElementById('authPass')?.value || '';
  const bar = document.getElementById('pwBar');
  const lbl = document.getElementById('pwLabel');
  if (!bar || !lbl) return;
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;
  const labels = ['','SANGAT LEMAH','LEMAH','SEDANG','KUAT','SANGAT KUAT'];
  const colors = ['','#FF3B3B','#FF8C00','#FFD700','#00C875','#00C875'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score] || '#333';
  lbl.textContent = labels[score] || '';
  lbl.style.color = colors[score] || '#444';
}

function submitAuth(mode) {
  const btn = document.getElementById('authSubmitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'MEMPROSES...'; }

  const errEl = document.getElementById('authError');
  const showErr = (msg) => {
    if (errEl) { errEl.textContent = '✗ ' + msg; errEl.style.color = 'var(--red)'; }
    if (btn) { btn.disabled = false; btn.textContent = mode === 'register' ? 'DAFTAR SEKARANG ▶' : 'MASUK ▶'; }
  };

  const username = (document.getElementById('authUser')?.value || '').trim();
  const password = document.getElementById('authPass')?.value || '';

  if (!username) return showErr('Username tidak boleh kosong');
  if (!password) return showErr('Password tidak boleh kosong');

  setTimeout(() => { // slight delay for UX feel
    if (mode === 'register') {
      const displayName = (document.getElementById('authDisplay')?.value || '').trim() || username.toUpperCase();
      const pass2 = document.getElementById('authPass2')?.value || '';
      if (password !== pass2) return showErr('Password tidak cocok');
      const result = registerUser(username, password, displayName);
      if (!result.ok) return showErr(result.msg);
      // Auto-login after register
      const loginRes = loginUser(username, password);
      if (!loginRes.ok) return showErr('Registrasi berhasil, silakan login');
      enterApp();
    } else {
      const result = loginUser(username, password);
      if (!result.ok) return showErr(result.msg);
      enterApp();
    }
  }, 300);
}

// ═══════════════════════════════════════
// XP SYSTEM
// ═══════════════════════════════════════
const XP_PER_LEVEL = 200;
function xpForLevel(l) { return (l-1) * XP_PER_LEVEL; }
function addXP(amount) {
  STATE.xp += amount;
  const newLevel = Math.floor(STATE.xp / XP_PER_LEVEL) + 1;
  if (newLevel > STATE.level) {
    STATE.level = newLevel;
    showXPPopup(`🏆 LEVEL ${STATE.level}!`, true);
  }
  save();
  updateHeader();
}
function updateHeader() {
  document.getElementById('hLvl').textContent = STATE.level;
  document.getElementById('hXp').textContent = STATE.xp;
  document.getElementById('hStreak').textContent = STATE.streak;
  const pct = ((STATE.xp % XP_PER_LEVEL) / XP_PER_LEVEL * 100).toFixed(1);
  document.getElementById('xpbarFill').style.width = pct + '%';
}
function showXPPopup(msg, big=false) {
  const el = document.createElement('div');
  el.className = 'xp-popup';
  el.style.fontSize = big ? '18px' : '13px';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function startLevel(lvl) {
  if (lvl > STATE.level + 5) {
    showXPPopup('🔒 LEVEL TERKUNCI');
    return;
  }
  // Find which category this level belongs to
  const cat = CATEGORIES.find(c => c.levels.includes(lvl)) || CATEGORIES[0];
  STATE.currentCat = cat.id;
  showScreen('train');
  loadQuestion(cat.id, lvl);
}

function startCategorySession(catId) {
  STATE.currentCat = catId;
  const cat = CATEGORIES.find(c => c.id === catId);
  // Find next uncompleted level in this category
  const nextLvl = cat.levels.find(l => !STATE.completed.includes(l)) || cat.levels[0];
  showScreen('train');
  loadQuestion(catId, nextLvl);
}

Jawab HANYA JSON.`,
  };

  const prompt = prompts[catId] || prompts.iq;

}

async function fetchAI(prompt, lvl, catId) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    // Find JSON object
    const jsonMatch = clean.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON');
    const q = JSON.parse(jsonMatch[0]);
    STATE.currentQ = { ...q, level: lvl, catId };
    renderQuestion(q, lvl, catId);
  } catch(e) {
    // Fallback questions
    renderFallback(catId, lvl);
  }
}

      <div class="expl-text" id="explText"></div>
    </div>

    <div class="flex gap-12 mt-24" id="navBtns" style="display:none!important">
      <button class="btn btn-secondary" onclick="renderDashboard();showScreen('dashboard')">← KEMBALI</button>
      <button class="btn btn-primary" onclick="nextQuestion(${catId ? `'${catId}'` : 'null'}, ${lvl})">SOAL BERIKUTNYA →</button>
    </div>
  `;

  startTimer(timeLimit, catId, lvl);
}

function checkAnswer(idx) {
  if (!STATE.currentQ) return;
  clearTimer();
  const q = STATE.currentQ;
  const correct = idx === q.answer;
  document.querySelectorAll('.option').forEach((o,i) => {
    o.disabled = true;
    if (i === q.answer) o.classList.add('correct');
    else if (i === idx) o.classList.add('wrong');
  });
  handleResult(correct, q);
}

function submitInput() {
  if (!STATE.currentQ) return;
  clearTimer();
  const q = STATE.currentQ;
  const inp = document.getElementById('ansInput');
  const val = inp.value.trim().toLowerCase();
  const ans = String(q.answer).toLowerCase();
  const correct = val === ans || val.replace(/\s/g,'') === ans.replace(/\s/g,'');
  inp.disabled = true;
  inp.classList.add(correct ? 'correct' : 'wrong');
  handleResult(correct, q);
}

function handleResult(correct, q) {
  STATE.totalAnswered = (STATE.totalAnswered || 0) + 1;
  if (correct) {
    STATE.totalCorrect = (STATE.totalCorrect || 0) + 1;
    STATE.streak++;
    const xpGain = 10 + Math.floor(q.level * 0.5) + (STATE.streak >= 3 ? 5 : 0);
    addXP(xpGain);
    showXPPopup(`+${xpGain} XP${STATE.streak >= 3 ? ' 🔥' : ''}`);
    if (!STATE.completed.includes(q.level)) {
      STATE.completed.push(q.level);
      STATE.catProgress[q.catId] = (STATE.catProgress[q.catId] || 0) + 1;
      if (STATE.level < q.level + 1) STATE.level = q.level + 1;
    }
  } else {
    STATE.streak = 0;
  }
  save();

  // Show explanation
  const explBox = document.getElementById('explBox');
  document.getElementById('explText').innerHTML = q.explanation
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  explBox.classList.add('show');

  // Show nav
  const nav = document.getElementById('navBtns');
  if (nav) { nav.style.display = 'flex'; nav.style.removeProperty('display'); nav.style.display = 'flex'; }
  updateHeader();
}

function nextQuestion(catId, currentLvl) {
  const cat = CATEGORIES.find(c => c.id === catId);
  if (!cat) { showScreen('dashboard'); renderDashboard(); return; }
  const nextLvl = cat.levels.find(l => l > currentLvl) || cat.levels[cat.levels.length - 1];
  loadQuestion(catId, nextLvl);
}

// ═══════════════════════════════════════
// TIMER
// ═══════════════════════════════════════
function startTimer(secs, catId, lvl) {
  STATE.timerVal = secs;
  clearTimer();
  STATE.timer = setInterval(() => {
    STATE.timerVal -= 0.1;
    const el = document.getElementById('timerDisp');
    if (!el) { clearTimer(); return; }
    el.textContent = Math.ceil(STATE.timerVal) + 's';
    if (STATE.timerVal <= 10) el.classList.add('warn');
    if (STATE.timerVal <= 0) {
      clearTimer();
      el.textContent = '0s';
      STATE.streak = 0;
      save();
      // Show timeout
      const q = STATE.currentQ || { level: lvl, catId, explanation: 'Waktu habis! Latih kecepatan berpikir dan coba lagi.' };
      document.querySelectorAll('.option').forEach(o => o.disabled = true);
      const inp = document.getElementById('ansInput');
      if (inp) inp.disabled = true;
      const explBox = document.getElementById('explBox');
      document.getElementById('explText').innerHTML = `⏰ <strong>WAKTU HABIS!</strong><br>${q.explanation || 'Coba lagi untuk meningkatkan kecepatan.'}`;
      if (explBox) explBox.classList.add('show');
      const nav = document.getElementById('navBtns');
      if (nav) { nav.style.display = 'flex'; }
    }
  }, 100);
}
function clearTimer() {
  if (STATE.timer) { clearInterval(STATE.timer); STATE.timer = null; }
}

// ═══════════════════════════════════════
// MEMORY TEST
// ═══════════════════════════════════════
function loadMemoryTest(lvl) {
  const gridSize = Math.min(3 + Math.floor(lvl / 12), 7); // 3x3 to 7x7
  const cellCount = gridSize * gridSize;
  const litCount = Math.min(3 + Math.floor(lvl / 8), Math.floor(cellCount * 0.4));

  STATE.memPattern = [];
  while (STATE.memPattern.length < litCount) {
    const r = Math.floor(Math.random() * cellCount);
    if (!STATE.memPattern.includes(r)) STATE.memPattern.push(r);
  }
  STATE.memSelected = [];
  STATE.memPhase = 'show';

  const el = document.getElementById('trainContent');
  el.innerHTML = `
    <div class="quiz-header">
      <div>
        <div class="quiz-meta">MEMORI VISUAL — LEVEL <span>${lvl}</span></div>
        <div class="quiz-meta">Grid <span>${gridSize}×${gridSize}</span> • Hafal <span>${litCount}</span> sel</div>
      </div>
      <div class="timer-display" id="timerDisp">3s</div>
    </div>
    <div class="question-card" style="text-align:center">
      <div class="q-type-badge">FASE: HAFAL POLA</div>
      <div id="memStatus" style="font-family:var(--mono);font-size:13px;color:#666;margin-bottom:20px">Perhatikan sel yang menyala!</div>
      <div class="memory-grid" id="memGrid" style="grid-template-columns:repeat(${gridSize},1fr);max-width:${gridSize*60}px"></div>
    </div>
    <div class="explanation" id="explBox">
      <div class="expl-title">◆ HASIL</div>
      <div class="expl-text" id="explText"></div>
    </div>
    <div style="display:none" id="navBtns" class="flex gap-12 mt-24">
      <button class="btn btn-secondary" onclick="renderDashboard();showScreen('dashboard')">← KEMBALI</button>
      <button class="btn btn-primary" onclick="loadMemoryTest(${lvl})">COBA LAGI</button>
    </div>
  `;

  renderMemGrid(gridSize, true);

  // Show phase: 2s
  let countdown = 3;
  const ci = setInterval(() => {
    countdown--;
    const t = document.getElementById('timerDisp');
    if (t) t.textContent = countdown + 's';
    if (countdown <= 0) {
      clearInterval(ci);
      startRecallPhase(gridSize, litCount, lvl);
    }
  }, 1000);
}

function renderMemGrid(gridSize, showPattern) {
  const el = document.getElementById('memGrid');
  if (!el) return;
  el.innerHTML = '';
  const cellCount = gridSize * gridSize;
  for (let i = 0; i < cellCount; i++) {
    const cell = document.createElement('div');
    cell.className = 'mem-cell';
    if (showPattern && STATE.memPattern.includes(i)) cell.classList.add('lit');
    cell.onclick = () => toggleMemCell(i, cell, gridSize);
    el.appendChild(cell);
  }
}

function startRecallPhase(gridSize, litCount, lvl) {
  STATE.memPhase = 'recall';
  const status = document.getElementById('memStatus');
  const badge = document.querySelector('.q-type-badge');
  const t = document.getElementById('timerDisp');
  if (status) status.textContent = `Klik ${litCount} sel yang tadi menyala!`;
  if (badge) badge.textContent = 'FASE: RECALL';

  renderMemGrid(gridSize, false); // hide pattern

  const timeLimit = 10 + litCount * 2;
  if (t) t.textContent = timeLimit + 's';
  STATE.timerVal = timeLimit;
  clearTimer();
  STATE.timer = setInterval(() => {
    STATE.timerVal -= 0.1;
    const td = document.getElementById('timerDisp');

function toggleMemCell(idx, cell, gridSize) {
  if (STATE.memPhase !== 'recall') return;
  if (STATE.memSelected.includes(idx)) {
    STATE.memSelected = STATE.memSelected.filter(i => i !== idx);
    cell.classList.remove('lit');
  } else {
    STATE.memSelected.push(idx);
    cell.classList.add('lit');
    if (STATE.memSelected.length >= STATE.memPattern.length) {
      clearTimer();
      checkMemory(document.querySelector('.quiz-meta span:last-child') ? null : null);
      checkMemoryWithLvl(lvl => {}, gridSize);
    }
  }
}

function checkMemory(lvl) {
  clearTimer();
  STATE.memPhase = 'done';
  const correct = STATE.memPattern.filter(i => STATE.memSelected.includes(i)).length;
  const total = STATE.memPattern.length;
  const allCorrect = correct === total && STATE.memSelected.length === total;

  // Color the grid
  document.querySelectorAll('.mem-cell').forEach((cell, i) => {
    cell.onclick = null;
    if (STATE.memPattern.includes(i) && STATE.memSelected.includes(i)) {
      cell.classList.remove('lit');
      cell.classList.add('correct');
    } else if (STATE.memPattern.includes(i)) {
      cell.classList.remove('lit');
      cell.classList.add('lit'); // show what was correct
    } else if (STATE.memSelected.includes(i)) {
      cell.classList.remove('lit');
      cell.classList.add('wrong');
    }
  });

  const explBox = document.getElementById('explBox');
  const explText = document.getElementById('explText');
  if (allCorrect) {
    explText.innerHTML = `✅ <strong>SEMPURNA!</strong> Kamu mengingat semua ${total} posisi dengan benar!<br>Memori visual kamu luar biasa.`;
    if (lvl) {

      addXP(xp);
      showXPPopup('+' + xp + ' XP');
      if (!STATE.completed.includes(lvl)) {

      }

    STATE.streak = 0; save();

function renderMemGridWithLvl(gridSize, showPattern, lvl) {
  const el = document.getElementById('memGrid');

// STROOP TEST
// ═══════════════════════════════════════
const STROOP_WORDS = ['MERAH','BIRU','HIJAU','KUNING','UNGU','ORANYE'];
const STROOP_COLORS = { MERAH:'#FF3B3B', BIRU:'#3B8BFF', HIJAU:'#00C875', KUNING:'#FFD700', UNGU:'#9B59B6', ORANYE:'#E67E22' };
let stroopRound = 0, stroopCorrect = 0, stroopTotal = 10;

function loadStroopTest(lvl) {
  stroopRound = 0; stroopCorrect = 0;
  stroopTotal = 10 + Math.floor(lvl / 5);
  renderStroopRound(lvl);
}

function renderStroopRound(lvl) {
  if (stroopRound >= stroopTotal) {
    finishStroop(lvl); return;
  }
  const wordIdx = Math.floor(Math.random() * STROOP_WORDS.length);
  const colorIdx = Math.floor(Math.random() * STROOP_WORDS.length);
  const word = STROOP_WORDS[wordIdx];
  const displayColor = STROOP_COLORS[STROOP_WORDS[colorIdx]];
  const correctAnswer = STROOP_WORDS[colorIdx]; // answer is the INK COLOR

  // Shuffle options
  const opts = [...STROOP_WORDS].sort(() => Math.random() - 0.5).slice(0, 4);
  if (!opts.includes(correctAnswer)) opts[0] = correctAnswer;
  const shuffled = opts.sort(() => Math.random() - 0.5);

  const el = document.getElementById('trainContent');
  el.innerHTML = `
    <div class="quiz-header">
      <div>
        <div class="quiz-meta">STROOP TEST — LEVEL <span>${lvl}</span></div>
        <div class="quiz-meta"><span>${stroopRound}</span>/${stroopTotal} • ✓ <span>${stroopCorrect}</span></div>
      </div>
      <div class="timer-display" id="timerDisp">-</div>
    </div>
    <div class="question-card" style="text-align:center;padding:40px">
      <div class="q-type-badge">WARNA TINTA, BUKAN KATA!</div>
      <div class="stroop-q">Apa WARNA TINTA dari kata di bawah ini?</div>
      <div class="stroop-word" style="color:${displayColor}">${word}</div>
    </div>
    <div class="options" style="max-width:500px;margin:0 auto" id="optionsEl">
      ${shuffled.map(opt => `
        <button class="option" style="justify-content:center" onclick="checkStroop('${opt}','${correctAnswer}',${lvl})">
          <span style="font-family:var(--mono);font-size:16px;color:${STROOP_COLORS[opt]}">${opt}</span>
        </button>
      `).join('')}
    </div>
  `;

  // Speed timer
  const timeLimit = Math.max(2, 5 - lvl * 0.03);
  STATE.timerVal = timeLimit;
  clearTimer();
  document.getElementById('timerDisp').textContent = timeLimit.toFixed(1) + 's';
  STATE.timer = setInterval(() => {
    STATE.timerVal -= 0.1;
    const td = document.getElementById('timerDisp');
    if (!td) { clearTimer(); return; }
    td.textContent = STATE.timerVal.toFixed(1) + 's';
    if (STATE.timerVal <= 0) {
      clearTimer();
      stroopRound++;
      renderStroopRound(lvl);
    }
  }, 100);
}

function checkStroop(answer, correct, lvl) {
  clearTimer();
  if (answer === correct) stroopCorrect++;
  stroopRound++;
  // Flash feedback briefly
  setTimeout(() => renderStroopRound(lvl), 200);
}

function finishStroop(lvl) {
  const pct = Math.round(stroopCorrect / stroopTotal * 100);
  const xp = Math.floor(pct * 0.2) + lvl;
  const passed = pct >= 70;
  if (passed) {
    STATE.streak++;
    addXP(xp);
    showXPPopup('+' + xp + ' XP');
    if (!STATE.completed.includes(lvl)) {
      STATE.completed.push(lvl);
      STATE.catProgress['stroop'] = (STATE.catProgress['stroop'] || 0) + 1;
    }
    save();
  } else {
    STATE.streak = 0; save();
  }
  updateHeader();

  document.getElementById('trainContent').innerHTML = `
    <div class="result-card">
      <div class="result-score">${pct}%</div>
      <div class="result-label">AKURASI STROOP</div>
      <div class="result-stats">
        <div class="rstat"><div class="rstat-val text-green">${stroopCorrect}</div><div class="rstat-key">BENAR</div></div>
        <div class="rstat"><div class="rstat-val text-red">${stroopTotal - stroopCorrect}</div><div class="rstat-key">SALAH</div></div>
        <div class="rstat"><div class="rstat-val text-gold">${stroopTotal}</div><div class="rstat-key">TOTAL</div></div>
      </div>
      <div style="margin-bottom:24px;font-size:13px;color:#666;line-height:1.6">
        ${pct >= 90 ? '🧠 Konsentrasi LUAR BIASA! Kamu memiliki inhibisi kognitif sangat tinggi.' :
          pct >= 70 ? '✅ Lulus! Konsentrasi kamu di atas rata-rata.' :
          '❌ Konsentrasi perlu ditingkatkan. Fokus pada warna tinta, bukan makna kata.'}
        <br><br>
        <strong style="color:var(--white)">Tentang Stroop Effect:</strong> Otak kita membaca kata lebih cepat daripada memproses warna. 
        Stroop test mengukur kemampuan inhibisi kognitif — yaitu kemampuan untuk menghambat respons otomatis dan fokus pada tugas spesifik. 
        Ayanokouji melatih ini untuk kontrol mental sempurna.
      </div>
      <div class="flex gap-12" style="justify-content:center">
        <button class="btn btn-secondary" onclick="renderDashboard();showScreen('dashboard')">← BERANDA</button>
        <button class="btn btn-primary" onclick="loadStroopTest(${lvl})">ULANGI</button>
      </div>
    </div>
  `;
}

function startPriceSimulation(lvl) {
  if (chartInterval) clearInterval(chartInterval);
  const volatility = 0.005 + lvl * 0.001;
  chartInterval = setInterval(() => {
    const td = STATE.tradeData;
    const change = (Math.random() - 0.48) * volatility * td.price;
    const oldPrice = td.price;
    td.price = Math.max(1, td.price + change);
    td.history.push(td.price);
    if (td.history.length > 60) td.history.shift();

    const pct = ((td.price - oldPrice) / oldPrice * 100);
    const pd = document.getElementById('priceDisp');
    const pc = document.getElementById('priceChange');
    const cv = document.getElementById('cashVal');
    const sv = document.getElementById('sharesVal');
    const pv = document.getElementById('portVal');
    const pnl = document.getElementById('pnlVal');
    if (!pd) { clearInterval(chartInterval); return; }

    pd.textContent = 'Rp ' + td.price.toFixed(0);
    pc.textContent = (pct >= 0 ? '▲ ' : '▼ ') + Math.abs(pct).toFixed(2) + '%';
    pc.className = 'price-change ' + (pct >= 0 ? 'up' : 'down');
    if (cv) cv.textContent = 'Rp ' + td.cash.toFixed(0);
    if (sv) sv.textContent = td.shares;
    const portValue = td.cash + td.shares * td.price;
    if (pv) { pv.textContent = 'Rp ' + portValue.toFixed(0); pv.className = 'val ' + (portValue >= 10000 ? 'up' : 'down'); }
    const pnlVal = portValue - 10000;
    if (pnl) { pnl.textContent = (pnlVal >= 0 ? '+' : '') + 'Rp ' + pnlVal.toFixed(0); pnl.className = 'val ' + (pnlVal >= 0 ? 'up' : 'down'); }

    drawChart();
  }, 500);
}

function drawChart() {
  const canvas = document.getElementById('miniChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const data = STATE.tradeData.history;
  if (data.length < 2) return;

  const min = Math.min(...data) * 0.99;
  const max = Math.max(...data) * 1.01;
  const w = canvas.width, h = canvas.height;

  ctx.clearRect(0, 0, w, h);
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / (max - min)) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = data[data.length-1] >= data[0] ? '#00C875' : '#FF3B3B';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Fill
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, data[data.length-1] >= data[0] ? 'rgba(0,200,117,0.15)' : 'rgba(255,59,59,0.15)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fill();
}

function executeTrade(type, lvl) {
  const td = STATE.tradeData;
  if (type === 'buy') {
    const canBuy = Math.floor(td.cash / td.price);
    if (canBuy <= 0) { showXPPopup('💰 Modal habis!'); return; }
    const qty = Math.max(1, Math.floor(canBuy * 0.1));
    td.shares += qty;
    td.cash -= qty * td.price;
    showXPPopup(`+${qty} saham @ Rp${td.price.toFixed(0)}`);
  } else {
    if (td.shares <= 0) { showXPPopup('📦 Tidak ada saham!'); return; }
    const qty = Math.max(1, Math.floor(td.shares * 0.5));
    td.cash += qty * td.price;
    td.shares -= qty;
    showXPPopup(`-${qty} saham @ Rp${td.price.toFixed(0)}`);
  }
}

function finishTrading(lvl) {
  const td = STATE.tradeData;
  const finalValue = td.cash + td.shares * td.price;
  const pnl = finalValue - 10000;
  const pct = (pnl / 10000 * 100).toFixed(1);
  const passed = pnl >= 0;
  const xp = passed ? 20 + lvl + Math.floor(Math.max(0, pnl) / 100) : 5;

  if (passed) {
    STATE.streak++;
    addXP(xp);
    showXPPopup('+' + xp + ' XP');
    if (!STATE.completed.includes(lvl)) {
      STATE.completed.push(lvl);
      STATE.catProgress['trade'] = (STATE.catProgress['trade'] || 0) + 1;
    }

  `;
  if (explBox) { explBox.style.display = 'block'; explBox.classList.add('show'); }

      explanation: `**C adalah strategi terbaik — multi-track negotiation.**\n\nAnalisis:\n• C memberi konsesi parsial (menjaga hubungan) sambil reduce dependensi (hedging risk)\n• "Diam-diam" onboard alternatif = leverage negosiasi masa depan\n• 6 bulan review = waktu untuk temukan opsi lebih baik\n\nPrinsip: Jangan pernah bergantung 100% pada satu pihak. Diversifikasi = kekuatan.`
    },
    {
      title: 'Krisis Reputasi',
      situation: `Produk kamu viral di media sosial karena satu pelanggan posting video bug yang membuat data hilang. Sudah 2 juta views dalam 3 jam. Tim engineering bilang bug sudah fixed, tapi belum di-publish.`,
      question: 'Respon krisis yang TEPAT dalam 1 jam pertama?',
      options: [
        'Diam, tunggu situasi reda sendiri',
        'Delete post pelanggan, contact langsung minta remove',
        'Post statement resmi: akui masalah, jelaskan sudah fixed, tawarkan kompensasi, update timeline',
        'Hire influencer untuk counter-narrative',
      ],
      answer: 2,
      explanation: `**C — Transparansi + Action adalah satu-satunya respons yang benar.**\n\nMengapa:\n• Crisis PR rule #1: jangan diam. Diam = mengakui tanpa action\n• Delete/suppress = backfire (Streisand Effect), perburuk situasi\n• Statement proaktif yang jujur mengurangi damage 60-80%\n• Kompensasi kecil sekarang jauh lebih murah dari reputasi rusak jangka panjang\n\nAyanokouji principle: "Kontrol narasi sebelum narasi mengontrolmu."`
    },
  ];

  const s = scenarios[Math.floor(Math.random() * scenarios.length)];
  const el = document.getElementById('trainContent');
  el.innerHTML = `
    <div class="quiz-header">
      <div>
        <div class="quiz-meta">SIMULASI BISNIS — LEVEL <span>${lvl}</span></div>
        <div class="quiz-meta">CEO Decision Making</div>
      </div>
      <div class="timer-display" id="timerDisp">45s</div>
    </div>
    <div class="question-card">
      <div class="q-type-badge">🏢 ${s.title.toUpperCase()}</div>
      <div style="font-size:14px;color:#888;line-height:1.7;margin-bottom:20px;padding:16px;background:#0a0a0a;border-radius:4px;border-left:2px solid var(--gold)">${s.situation}</div>
      <div class="q-text">${s.question}</div>
    </div>
    <div class="options" id="optionsEl">
      ${s.options.map((opt,i) => `
        <button class="option" onclick="checkBiz(${i},${s.answer},${lvl},'${encodeURIComponent(s.explanation)}')" id="opt${i}">
          <span class="opt-key">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation" id="explBox">
      <div class="expl-title">◆ ANALISIS BISNIS</div>
      <div class="expl-text" id="explText"></div>
    </div>
    <div style="display:none" id="navBtns" class="flex gap-12 mt-24">
      <button class="btn btn-secondary" onclick="renderDashboard();showScreen('dashboard')">← KEMBALI</button>
      <button class="btn btn-primary" onclick="loadBizSimulator(${lvl})">SKENARIO LAIN</button>
    </div>
  `;
  startTimer(45, 'biz', lvl);
}

function checkBiz(idx, answer, lvl, expl) {
  clearTimer();
  const correct = idx === answer;
  document.querySelectorAll('.option').forEach((o,i) => {
    o.disabled = true;
    if (i === answer) o.classList.add('correct');
    else if (i === idx) o.classList.add('wrong');
  });
  if (correct) {
    STATE.streak++;
    const xp = 15 + lvl;
    addXP(xp);
    showXPPopup('+' + xp + ' XP');
    if (!STATE.completed.includes(lvl)) {
      STATE.completed.push(lvl);
      STATE.catProgress['biz'] = (STATE.catProgress['biz'] || 0) + 1;
    }
  } else { STATE.streak = 0; }
  save(); updateHeader();
  const eb = document.getElementById('explBox');
  const et = document.getElementById('explText');
  et.innerHTML = decodeURIComponent(expl).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  if (eb) eb.classList.add('show');
  const nav = document.getElementById('navBtns');
  if (nav) nav.style.display = 'flex';
}

// FALLBACK QUESTIONS
// ═══════════════════════════════════════
const FALLBACKS = {
  iq: [
    { question:'Jika 2 + 2 = 8, 3 + 3 = 18, 4 + 4 = 32, maka 5 + 5 = ?', options:['40','50','45','55'], answer:1, explanation:'Polanya: n + n = n × (n+1). Jadi 5+5 = 5×(5+1) = 5×10 = 50.', hint:'Lihat hubungan antara angka dan hasilnya.' },
    { question:'Deret: 1, 1, 2, 3, 5, 8, 13, ?', options:['18','21','20','24'], answer:1, explanation:'Deret Fibonacci: setiap angka = jumlah dua angka sebelumnya. 8+13=21.', hint:'Lihat pola penjumlahan dua angka sebelumnya.' },
    { question:'Semua kucing adalah mamalia. Beberapa mamalia bisa terbang. Kesimpulan?', options:['Semua kucing bisa terbang','Beberapa kucing bisa terbang','Tidak ada kucing yang bisa terbang','Tidak dapat disimpulkan'], answer:3, explanation:'Dari premis yang ada, kita tidak bisa menyimpulkan apakah kucing termasuk "beberapa mamalia yang bisa terbang" atau tidak. Kesimpulan tidak dapat ditarik.', hint:'Hati-hati dengan logika syllogisme.' },
  ],
  math: [
    { question:'Tentukan nilai x: 2x² - 7x + 3 = 0', answer:'3 atau 0.5', explanation:'Faktorisasi: (2x-1)(x-3)=0. Jadi x=1/2=0.5 atau x=3. Bisa juga gunakan rumus ABC: x = (7±√(49-24))/4 = (7±5)/4.', hint:'Coba faktorisasi atau rumus ABC.' },
    { question:'Berapa banyak cara menyusun 5 orang dalam satu baris?', answer:'120', explanation:'Permutasi 5 orang = 5! = 5×4×3×2×1 = 120 cara.', hint:'Gunakan konsep permutasi/faktorial.' },
  ],
  fbi: [
    { question:'Seorang pria ditemukan tewas di kamar terkunci dari dalam. Tidak ada jendela. Kunci ada di dalam. Satu-satunya petunjuk: sebatang lilin yang sudah habis terbakar. Bagaimana pelaku masuk dan keluar?', options:['Pelaku menggunakan duplikat kunci','Pelaku masuk lewat ventilasi','Korban bunuh diri','Pelaku membekukan kunci, masuk, lalu mencairkannya dari luar'], answer:2, explanation:'Tidak ada tanda kekerasan eksternal + kunci dari dalam + lilin terbakar (menunjukkan waktu kematian) = paling logis adalah bunuh diri. Pelaku = korban sendiri. Ini adalah logical deduction: eliminasi semua yang impossible, sisanya adalah jawabannya (Occam\'s Razor).', hint:'Sherlock Holmes: "Eliminate the impossible, whatever remains must be the truth."' },
  ],
};

function renderFallback(catId, lvl) {
  const pool = FALLBACKS[catId] || FALLBACKS.iq;
  const q = pool[Math.floor(Math.random() * pool.length)];
  STATE.currentQ = { ...q, level: lvl, catId };
  renderQuestion(q, lvl, catId);
}

  document.getElementById('profileContent').innerHTML = `

        <div style="font-family:var(--mono);font-size:11px;color:#444">@${AUTH.currentUser || '—'} · Bergabung ${joinDate}</div>

      <div class="rstat"><div class="rstat-val text-green">${STATE.level}</div><div class="rstat-key">LEVEL</div></div>

      <div class="rstat"><div class="rstat-val">${acc}%</div><div class="rstat-key">AKURASI</div></div>
      <div class="rstat"><div class="rstat-val text-red">${STATE.streak}</div><div class="rstat-key">STREAK 🔥</div></div>
      <div class="rstat"><div class="rstat-val">${STATE.totalAnswered}</div><div class="rstat-key">DIJAWAB</div></div>
    </div>

    <div class="sec-title">PROGRESS KATEGORI</div>
    <div style="margin-bottom:32px">
      ${CATEGORIES.map(cat => {
        const done = STATE.catProgress[cat.id] || 0;
        const total = cat.levels.length;
        const pct = Math.round(done / total * 100);
        return `
          <div style="margin-bottom:16px">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px">
              <span style="font-family:var(--mono);font-size:11px">${cat.icon} ${cat.name}</span>
              <span style="font-family:var(--mono);font-size:11px;color:${cat.color}">${done}/${total}</span>
            </div>
            <div style="height:3px;background:#111;border-radius:2px">
              <div style="height:100%;width:${pct}%;background:${cat.color};border-radius:2px;transition:width 0.5s"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="sec-title">PENGATURAN AKUN</div>
    <div style="max-width:400px">
      <div class="auth-field">
        <label class="auth-label">UBAH DISPLAY NAME</label>
        <input class="auth-input" id="newDisplayName" value="${STATE.playerName}" maxlength="30">
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn btn-primary" onclick="updateDisplayName()" style="font-size:10px;padding:10px 20px">SIMPAN</button>
        <button class="btn btn-danger" onclick="confirmDeleteAccount()" style="font-size:10px;padding:10px 20px">HAPUS AKUN</button>
      </div>
    </div>
  `;
}

function updateDisplayName() {
  const val = document.getElementById('newDisplayName')?.value.trim();
  if (!val || val.length < 1) return;
  STATE.playerName = val.toUpperCase();
  // Update registry
  const reg = getRegistry();
  const entry = reg.find(u => u.username === AUTH.currentUser);
  if (entry) { entry.displayName = STATE.playerName; saveRegistry(reg); }
  save();
  showXPPopup('✓ Nama diperbarui');
  renderProfile();
}

function confirmDeleteAccount() {
  const username = AUTH.currentUser;
  const conf = prompt(`PERINGATAN: Ketik username "${username}" untuk konfirmasi hapus akun permanen:`);
  if (conf === username) {
    // Remove from registry
    const reg = getRegistry().filter(u => u.username !== username);
    saveRegistry(reg);
    localStorage.removeItem('wr_user_' + username);
    localStorage.removeItem('wr_session');
    AUTH.currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('app').classList.remove('visible');
    showAuthScreen();
    alert('Akun berhasil dihapus.');
  } else if (conf !== null) {
    alert('Username tidak cocok. Penghapusan dibatalkan.');
  }
}
